<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060C1A"/>
      <stop offset="60%" style="stop-color:#0A0F1E"/>
      <stop offset="100%" style="stop-color:#0D1729"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00D4FF;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#00D4FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bgGrad)"/>

  <!-- Grid lines - horizontal -->
  <line x1="0" y1="66" x2="1584" y2="66" stroke="#1A2744" stroke-width="0.5"/>
  <line x1="0" y1="132" x2="1584" y2="132" stroke="#1A2744" stroke-width="0.5"/>
  <line x1="0" y1="198" x2="1584" y2="198" stroke="#1A2744" stroke-width="0.5"/>
  <line x1="0" y1="264" x2="1584" y2="264" stroke="#1A2744" stroke-width="0.5"/>
  <line x1="0" y1="330" x2="1584" y2="330" stroke="#1A2744" stroke-width="0.5"/>

  <!-- Grid lines - vertical -->
  <line x1="198" y1="0" x2="198" y2="396" stroke="#1A2744" stroke-width="0.5"/>
  <line x1="396" y1="0" x2="396" y2="396" stroke="#1A2744" stroke-width="0.5"/>
  <line x1="594" y1="0" x2="594" y2="396" stroke="#1A2744" stroke-width="0.5"/>
  <line x1="792" y1="0" x2="792" y2="396" stroke="#1A2744" stroke-width="0.5"/>
  <line x1="990" y1="0" x2="990" y2="396" stroke="#1A2744" stroke-width="0.5"/>
  <line x1="1188" y1="0" x2="1188" y2="396" stroke="#1A2744" stroke-width="0.5"/>
  <line x1="1386" y1="0" x2="1386" y2="396" stroke="#1A2744" stroke-width="0.5"/>

  <!-- Glow orb top-right -->
  <ellipse cx="1300" cy="80" rx="280" ry="160" fill="#00D4FF" opacity="0.06"/>

  <!-- Glow orb bottom-left -->
  <ellipse cx="200" cy="330" rx="200" ry="120" fill="#00D4FF" opacity="0.04"/>

  <!-- Neural network nodes - decorative right side -->
  <!-- Nodes -->
  <circle cx="1080" cy="120" r="4" fill="#00D4FF" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1160" cy="180" r="3" fill="#00D4FF" opacity="0.4"/>
  <circle cx="1240" cy="100" r="5" fill="#00D4FF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="1320" cy="200" r="3" fill="#00D4FF" opacity="0.3"/>
  <circle cx="1400" cy="140" r="4" fill="#00D4FF" opacity="0.5"/>
  <circle cx="1460" cy="240" r="3" fill="#00D4FF" opacity="0.35"/>
  <circle cx="1120" cy="270" r="3" fill="#00D4FF" opacity="0.3"/>
  <circle cx="1200" cy="320" r="4" fill="#00D4FF" opacity="0.4"/>
  <circle cx="1360" cy="290" r="3" fill="#00D4FF" opacity="0.3"/>
  <circle cx="1500" cy="180" r="5" fill="#00D4FF" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1540" cy="300" r="3" fill="#00D4FF" opacity="0.3"/>

  <!-- Connecting lines neural network -->
  <line x1="1080" y1="120" x2="1160" y2="180" stroke="#00D4FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="1080" y1="120" x2="1240" y2="100" stroke="#00D4FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="1160" y1="180" x2="1240" y2="100" stroke="#00D4FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="1160" y1="180" x2="1320" y2="200" stroke="#00D4FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="1240" y1="100" x2="1400" y2="140" stroke="#00D4FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="1320" y1="200" x2="1400" y2="140" stroke="#00D4FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="1400" y1="140" x2="1500" y2="180" stroke="#00D4FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="1320" y1="200" x2="1460" y2="240" stroke="#00D4FF" stroke-width="0.8" opacity="0.2"/>
  <line x1="1120" y1="270" x2="1200" y2="320" stroke="#00D4FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="1160" y1="180" x2="1120" y2="270" stroke="#00D4FF" stroke-width="0.8" opacity="0.2"/>
  <line x1="1460" y1="240" x2="1500" y2="180" stroke="#00D4FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="1360" y1="290" x2="1460" y2="240" stroke="#00D4FF" stroke-width="0.8" opacity="0.2"/>
  <line x1="1360" y1="290" x2="1200" y2="320" stroke="#00D4FF" stroke-width="0.8" opacity="0.2"/>
  <line x1="1500" y1="180" x2="1540" y2="300" stroke="#00D4FF" stroke-width="0.8" opacity="0.2"/>

  <!-- Accent horizontal line -->
  <line x1="0" y1="198" x2="1584" y2="198" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Main logo mark - left area -->
  <g transform="translate(110, 148)">
    <polygon points="50,0 86,20 86,60 50,80 14,60 14,20" fill="none" stroke="#00D4FF" stroke-width="2.5" filter="url(#glow)"/>
    <line x1="30" y1="64" x2="30" y2="16" stroke="#00D4FF" stroke-width="5" stroke-linecap="round"/>
    <line x1="30" y1="16" x2="70" y2="64" stroke="#00D4FF" stroke-width="5" stroke-linecap="round"/>
    <line x1="70" y1="64" x2="70" y2="16" stroke="#00D4FF" stroke-width="5" stroke-linecap="round"/>
    <circle cx="30" cy="16" r="4" fill="#00D4FF" filter="url(#glow)"/>
    <circle cx="70" cy="16" r="4" fill="#00D4FF" filter="url(#glow)"/>
    <circle cx="30" cy="64" r="4" fill="#00D4FF" filter="url(#glow)"/>
    <circle cx="70" cy="64" r="4" fill="#00D4FF" filter="url(#glow)"/>
    <circle cx="50" cy="40" r="3" fill="#FFFFFF" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="230" y="228" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700" letter-spacing="16" fill="#FFFFFF">NEXIS</text>

  <!-- Tagline -->
  <text x="233" y="272" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="400" letter-spacing="8" fill="#00D4FF">NEXT INTELLIGENCE SYSTEMS</text>

  <!-- Divider -->
  <rect x="232" y="290" width="60" height="1.5" fill="#00D4FF" opacity="0.8"/>

  <!-- Sub-tagline -->
  <text x="232" y="316" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="400" letter-spacing="3" fill="#8899BB">AI-Powered Intelligence Platforms · Botswana &amp; Africa</text>

  <!-- Product pills -->
  <g transform="translate(232, 335)">
    <!-- ABI -->
    <rect x="0" y="0" width="70" height="24" rx="12" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.6"/>
    <text x="35" y="16" font-family="Georgia, serif" font-size="10" letter-spacing="1.5" fill="#00D4FF" text-anchor="middle" opacity="0.9">ABI</text>
    <!-- RiskSight -->
    <rect x="82" y="0" width="100" height="24" rx="12" fill="none" stroke="#4A9EFF" stroke-width="1" opacity="0.6"/>
    <text x="132" y="16" font-family="Georgia, serif" font-size="10" letter-spacing="1.5" fill="#4A9EFF" text-anchor="middle" opacity="0.9">RISKSIGHT</text>
    <!-- PrimeCover -->
    <rect x="194" y="0" width="114" height="24" rx="12" fill="none" stroke="#6C7AFF" stroke-width="1" opacity="0.6"/>
    <text x="251" y="16" font-family="Georgia, serif" font-size="10" letter-spacing="1.5" fill="#6C7AFF" text-anchor="middle" opacity="0.9">PRIMECOVER</text>
    <!-- BookMate -->
    <rect x="320" y="0" width="106" height="24" rx="12" fill="none" stroke="#00CCAA" stroke-width="1" opacity="0.6"/>
    <text x="373" y="16" font-family="Georgia, serif" font-size="10" letter-spacing="1.5" fill="#00CCAA" text-anchor="middle" opacity="0.9">BOOKMATE</text>
  </g>

  <!-- Website URL - bottom right -->
  <text x="1520" y="376" font-family="Georgia, serif" font-size="12" letter-spacing="2" fill="#4A6080" text-anchor="end">www.nexis.ai</text>
</svg>
